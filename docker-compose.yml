services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-exoplanets}
      POSTGRES_USER: ${DB_USER:-exoplanet_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-exoplanet_pass}
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-exoplanet_user} -d ${DB_NAME:-exoplanets}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - exoplanet-net

  seed-data:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-exoplanets}
      DB_USER: ${DB_USER:-exoplanet_user}
      DB_PASSWORD: ${DB_PASSWORD:-exoplanet_pass}
    command: python -m exoplanet_explorer.data.seed
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - exoplanet-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NAME: "Exoplanet Explorer"
      DEBUG: "true"
      ADDRESS: "0.0.0.0"
      PORT: "8000"
      RELOAD: "true"
      API_KEY: ${API_KEY:-dev-api-key}
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173", "http://client:80", "http://client-web-react:80"]'
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-exoplanets}
      DB_USER: ${DB_USER:-exoplanet_user}
      DB_PASSWORD: ${DB_PASSWORD:-exoplanet_pass}
    ports:
      - "${BACKEND_PORT_EXTERNAL:-8000}:8000"
    depends_on:
      seed-data:
        condition: service_completed_successfully
    networks:
      - exoplanet-net

  client-web-react:
    build:
      context: ./client-web-react
      dockerfile: Dockerfile
    ports:
      - "${CLIENT_PORT_EXTERNAL:-3000}:80"
    depends_on:
      - backend
    networks:
      - exoplanet-net

  caddy:
    image: caddy:2-alpine
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
    depends_on:
      - backend
      - client-web-react
    networks:
      - exoplanet-net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  exoplanet-net:
    driver: bridge
